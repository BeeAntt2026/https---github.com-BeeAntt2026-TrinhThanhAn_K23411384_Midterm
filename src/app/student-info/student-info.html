<div class="stu-card text-center">
  <marquee direction="up" scrollamount="5" height="300">

    <div class="stu-avatar-wrap mb-2 mt-1">
      <img src="assets/avatar.jpg"
           class="stu-avatar"
           alt="Avatar">
    </div>

    <p class="stu-name">{{ studentName }}</p>
    <p class="stu-id">ID: {{ studentId }}</p>
    <p class="stu-class">Lớp: {{ className }}</p>

    <!-- Padding cuối để marquee scroll mượt -->
    <div style="height: 80px;"></div>

  </marquee>
</div>
