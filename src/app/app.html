<div class="page-wrapper">

  <!-- ===== VÙNG C – MENU (trên cùng) ===== -->
  <nav class="zone-c navbar navbar-expand-lg navbar-dark px-4">

    <span class="navbar-brand fw-bold me-4">Mickey Store</span>

    <div class="navbar-nav d-flex flex-row gap-1">

      <!-- Products -->
      <a class="nav-link nav-btn" [routerLink]="'shopping'"
         routerLinkActive="nav-btn-active">
        🛍️ Products
      </a>

      <!-- Order dropdown -->
      <div class="nav-item dropdown">
        <a class="nav-link nav-btn dropdown-toggle"
           data-bs-toggle="dropdown" role="button">
          🛒 Order
        </a>
        <ul class="dropdown-menu dropdown-menu-dark">
          <!-- Q10, Q11: Chỉ Customer được xem Current Order -->
          <li *ngIf="isCustomer()">
            <a class="dropdown-item" [routerLink]="'cart'">
              📋 Current Order
            </a>
          </li>
          <!-- Q12: Chỉ Employee được xem Revenue statistics -->
          <li *ngIf="isEmployee()">
            <a class="dropdown-item" [routerLink]="'revenue'">
              📊 Revenue statistics
            </a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- ===== BODY: D (trái, lớn) + A (phải, nhỏ) ===== -->
  <div class="zone-body">

    <!-- VÙNG D – Nội dung chính (router-outlet) -->
    <div class="zone-d">
      <router-outlet></router-outlet>
    </div>

    <!-- VÙNG A – Thông tin sinh viên (cột phải, nhỏ) -->
    <div class="zone-a">
      <app-student-info></app-student-info>
    </div>

  </div>

  <!-- ===== VÙNG B – Login / Welcome X (dưới cùng) ===== -->
  <div class="zone-b px-4">

    <!-- Chưa đăng nhập -->
    <div *ngIf="!loggedInUser" class="d-flex align-items-center gap-3">
      <span class="text-white-50 small">
        Customer or Employee Login:
      </span>
      <a [routerLink]="'login'" class="btn btn-sm btn-outline-light fw-bold">
        🔐 Login
      </a>
    </div>

    <!-- Đã đăng nhập: Welcome X -->
    <div *ngIf="loggedInUser" class="d-flex align-items-center gap-3">
      <span class="welcome-badge">
        👋 Welcome
        <strong>
          {{ loggedInUser.customerName || loggedInUser.employeeName }}
        </strong>
        <span class="role-tag" *ngIf="isEmployee()">Employee</span>
        <span class="role-tag customer-tag" *ngIf="!isEmployee()">Customer</span>
      </span>
      <button class="btn btn-sm btn-danger fw-bold"
              (click)="logout()">
        ✕ Logout
      </button>
    </div>

  </div>

</div>
